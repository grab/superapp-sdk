image: node:24

cache:
  key:
    files:
      - package-lock.json
  paths:
    - node_modules/

stages:
  - check
  - build
  - publish

check:
  stage: check
  script:
    - npm run check

build:
  stage: build
  script:
    - npm run build
  needs:
    - check
  artifacts:
    paths:
      - dist/

publish-to-npm:
  stage: publish
  needs:
    - build
  script:
    - echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
    - npm publish --access public
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+$/'

publish-to-npm-beta:
  stage: publish
  needs:
    - build
  script:
    - echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
    - npm publish --access public --tag beta
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+-beta\.[0-9]+$/'

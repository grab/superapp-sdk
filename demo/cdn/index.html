<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@grabjs/superapp-sdk@beta/dist/index.js"></script>
    <script src="config.js?v=1"></script>
    <script src="ui-helpers.js?v=1"></script>
  </head>
  <body class="p-4">
    <div id="warningArea" class="mb-4"></div>
    <div id="content"></div>

    <script>
      async function init() {
        // Initialize modules
        const container = new SuperAppSDK.ContainerModule();
        const identity = new SuperAppSDK.IdentityModule();
        const scope = new SuperAppSDK.ScopeModule();
        const location = new SuperAppSDK.LocationModule();
        const locale = new SuperAppSDK.LocaleModule();

        // Initial render with loading state
        const content = document.getElementById('content');
        content.innerHTML = `<p>Loading user information...</p>`;

        // Container setup - optional, don't block on failure
        await runOptional('Set background color', container.setBackgroundColor('#005339'));
        await runOptional('Set title', container.setTitle('Home'));
        await runOptional('Hide back button', container.hideBackButton());
        await runOptional('Show refresh button', container.showRefreshButton());

        // Fetch locale - optional
        const localeResponse = await locale.getLanguageLocaleIdentifier();
        const localeValue = SuperAppSDK.isSuccess(localeResponse) ? localeResponse.result : 'N/A';

        // Read user info from sessionStorage (set by entry.html)
        const userName = sessionStorage.getItem('user_name') || 'N/A';
        const userEmail = sessionStorage.getItem('user_email') || 'N/A';
        const userPhone = sessionStorage.getItem('user_phone') || 'N/A';

        if (userName === 'N/A' && userEmail === 'N/A') {
          show('content', 'No user information found. Please authorize first.', 'error');
          return;
        }

        // Send analytics - optional, don't block on failure
        await runOptional('Send DEFAULT analytics', container.sendAnalyticsEvent({
          state: 'HOMEPAGE',
          name: 'DEFAULT'
        }));

        content.innerHTML = `
          <h1 class="text-xl font-bold mb-4">User Information</h1>
          <div class="space-y-2 mb-6">
            <p><strong>Name:</strong> ${escapeHtml(userName)}</p>
            <p><strong>Email:</strong> ${escapeHtml(userEmail)}</p>
            <p><strong>Phone:</strong> ${escapeHtml(userPhone)}</p>
            <p><strong>Locale:</strong> ${escapeHtml(localeValue)}</p>
          </div>

          <div class="mt-6 space-y-3">
            <button id="viewMapBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">
              View Location on Map
            </button>
            <button id="checkoutBtn" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded">
              Go to Checkout
            </button>
          </div>
          <div id="actionResult" class="mt-4"></div>
        `;

        document.getElementById('viewMapBtn').addEventListener('click', async () => {
          // Check if the app already has access to location coordinates
          const hasAccessResponse = await scope.hasAccessTo('LocationModule', 'getCoordinate');

          if (!SuperAppSDK.isSuccess(hasAccessResponse) || !hasAccessResponse.result) {
            // Request authorization for the mobile.geolocation scope.
            // Note: mobile.geolocation is a 'mobile scope', which means it only grants 
            // permission within the native app. No backend token exchange is required 
            // to use LocationModule methods after authorization.
            const authResponse = await identity.authorize({
              clientId: ENVIRONMENT_CONFIG.clientId,
              redirectUri: window.location.href,
              scope: 'mobile.geolocation',
              environment: ENVIRONMENT,
              responseMode: 'in_place'
            });

            if (authResponse.status_code !== 200) {
              if (SuperAppSDK.isError(authResponse)) {
                show('actionResult', `Location access denied: ${authResponse.error}`, 'error');
              } else if (authResponse.status_code === 204) {
                show('actionResult', 'Location access was cancelled.', 'warning');
              }
              return;
            }

            const reloadResponse = await scope.reloadScopes();
            if (!SuperAppSDK.isSuccess(reloadResponse)) {
              show('content', formatError('Reload scopes', reloadResponse), 'error');
              return;
            }
            await identity.clearAuthorizationArtifacts();
          }

          const locationResponse = await location.getCoordinate();
          if (!SuperAppSDK.isSuccess(locationResponse)) {
            show('actionResult', formatError('Fetch location', locationResponse), 'error');
            return;
          }

          // Send analytics - optional
          await runOptional('Send INITIATE analytics', container.sendAnalyticsEvent({
            state: 'HOMEPAGE',
            name: 'INITIATE'
          }));

          const lat = locationResponse.result.latitude;
          const lng = locationResponse.result.longitude;
          const mapUrl = `https://www.google.com/maps/search/?api=1&query=${lat},${lng}`;

          // Open map - handle response (only show errors)
          const openResponse = await container.openExternalLink(mapUrl);
          if (!SuperAppSDK.isSuccess(openResponse)) {
            show('actionResult', formatError('Open map', openResponse), 'error');
          }
        });

        // Navigate to checkout
        document.getElementById('checkoutBtn').addEventListener('click', () => {
          window.location.href = 'checkout.html?v=1';
        });
      }

      document.addEventListener('DOMContentLoaded', init);

      // Re-apply container settings when page is restored
      window.addEventListener('pageshow', (event) => {
        if (event.persisted) {
          const container = new SuperAppSDK.ContainerModule();
          runOptional('Set background color', container.setBackgroundColor('#005339'));
          runOptional('Set title', container.setTitle('Home'));
          runOptional('Hide back button', container.hideBackButton());
          runOptional('Show refresh button', container.showRefreshButton());
        }
      });
    </script>
  </body>
</html>
